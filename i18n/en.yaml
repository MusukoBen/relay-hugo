th_relay_dark_desc:
  other: "The default theme. Deep black, green accent, soft glassmorphism cards. Minimal and focused."
th_midnight_desc:
  other: "Geometric and architectural. Transparent cards with visible borders. Uppercase everywhere."
th_aurora_desc:
  other: "Purple gradient buttons, Playfair Display for headings, italic descriptions. Elegant and soft."
th_obsidian_desc:
  other: "Yellow accent, IBM Plex Mono, sharp 2px radius. Technical and precise."
th_sunset_desc:
  other: "Rosé and coral. Gradient save button, large rounded radius. Warm and inviting."
th_arctic_desc:
  other: "Ice blue. Space Mono, angular 2px radius. Clear and cold like a server room."
th_bbc_desc:
  other: "British 8-bit computer. Orange-red phosphor, scanline overlay, full uppercase."
th_apple2_desc:
  other: "The original. Green phosphor on black. The screen of the first hackers."
th_amstrad_desc:
  other: "Cyan on black. No scanline overlay — the CPC display was remarkably clear."
th_vt100_desc:
  other: "The Unix workhorse. Warm amber phosphor, IBM Plex Mono, scanline grid."
th_ibm3270_desc:
  other: "The oldest terminal in the set. Mainframe green, IBM Plex Mono. No frills."
th_xerox_desc:
  other: "The only light retro theme. Paper-white background, Lora serif, classic typography."
th_gameboy_desc:
  other: "4-color LCD palette. Press Start 2P, 4px LCD scanlines. The most pixelated theme in the set."
th_zx_desc:
  other: "Yellow on black. No scanlines — the ZX had a sharp, clear display."
th_dos_desc:
  other: "Blue DOS background, cyan accent. Heavy CRT effect. C:\\> feeling."
th_c64_desc:
  other: "Commodore 64. Blue background, purple text. READY. The classic."
