pricing_faq_title:
  other: "Frequently Asked Questions"
pricing_faq_q1:
  other: "Can I try Relay before buying?"
pricing_faq_a1:
  other: "Yes — the Free plan is permanently free and includes three complete themes. No time limit, no account required."
pricing_faq_q2:
  other: "What does \"all future updates\" mean with Lifetime?"
pricing_faq_a2:
  other: "You'll receive all new themes, features, and major versions (Relay 2, 3, etc.) at no additional cost — as long as Relay exists."
pricing_faq_q3:
  other: "Which payment methods are accepted?"
pricing_faq_a3:
  other: "Credit card, SEPA direct debit, PayPal, and Apple Pay — processed via Stripe. Invoices available on request."
pricing_faq_q4:
  other: "Are there discounts for teams or schools?"
pricing_faq_a4:
  other: "Yes — from 5 licenses there's a 20% team discount. Educational institutions get 50% off. Contact us via email."
pricing_faq_q5:
  other: "Does Relay run on older Macs?"
pricing_faq_a5:
  other: "Relay requires macOS 14 Sonoma or later. Universal Binary — runs natively on Apple Silicon and Intel."
pricing_faq_q6:
  other: "What happens if I cancel my subscription?"
pricing_faq_a6:
  other: "You keep access until the end of the billing period. After that, the app reverts to the Free plan — your data is preserved."

