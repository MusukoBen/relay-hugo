# ── PRIVACY PAGE ──
privacy_label:
  other: "Legal"
privacy_title:
  other: "Privacy Policy"
privacy_sub:
  other: "Relay is designed to keep your data on your machine."
privacy_updated:
  other: "Last updated: April 13, 2026"
privacy_h_overview:
  other: "Overview"
privacy_overview:
  other: "Relay is a native macOS terminal emulator. It runs entirely on your device. We do not operate servers that receive, store or process your data."
privacy_h_no_collection:
  other: "No data collection"
privacy_no_collection:
  other: "Relay does not collect analytics, telemetry, crash reports or usage data of any kind. We have no tracking pixels, no SDKs and no server-side logs. We literally do not know who you are."
privacy_h_local_storage:
  other: "What is stored locally"
privacy_local_storage:
  other: "The following data is stored on your Mac in UserDefaults and local config files. It never leaves your machine:"
privacy_local_1:
  other: "App preferences (theme, font, shell settings)"
privacy_local_2:
  other: "Command history and working directories"
privacy_local_3:
  other: "Saved AI conversation turns"
privacy_local_4:
  other: "License key (stored in the macOS Keychain)"
privacy_local_5:
  other: "AI provider API keys (stored in UserDefaults — never transmitted to us)"
privacy_local_note:
  other: "All of this data stays on your device. Uninstalling Relay removes it."
privacy_h_network:
  other: "Network connections"
privacy_network_intro:
  other: "Relay makes outbound network requests only in these cases, all initiated by you:"
privacy_net_sparkle_title:
  other: "Update checks —"
privacy_net_sparkle:
  other: "Sparkle checks for new versions by fetching an appcast XML file. This transmits your app version and macOS version. No personal data is sent."
privacy_net_ai_title:
  other: "AI assistant —"
privacy_net_ai:
  other: "When you use relay ask or relay explain, your query and shell context are sent to the AI provider you configured (OpenAI or Anthropic) using your own API key. Relay does not proxy, log or store these requests."
privacy_net_webhook_title:
  other: "Webhooks —"
privacy_net_webhook:
  other: "If you configure a webhook URL in Settings, Relay sends a POST request with command metadata to that URL when a command finishes. This is entirely opt-in and goes to a URL you control."
privacy_network_note:
  other: "Relay makes no other network connections. There is no phone-home, no license server, and no cloud sync."
privacy_h_third_party:
  other: "Third-party services"
privacy_third_party:
  other: "Relay itself does not integrate with any third-party analytics or advertising services. If you use the AI assistant feature, your requests are handled by OpenAI or Anthropic under their respective privacy policies. Relay has no affiliation with either provider."
privacy_h_children:
  other: "Children"
privacy_children:
  other: "Relay is not directed at children under 13 and does not knowingly collect data from children."
privacy_h_changes:
  other: "Changes to this policy"
privacy_changes:
  other: "If we update this policy, we will post the changes on this page with a new date. Since Relay collects no data, changes are unlikely to be material."
privacy_h_contact:
  other: "Contact"
privacy_contact:
  other: "Questions about this policy? Email <a href=\"mailto:relay-support@notetheco.de\">relay-support@notetheco.de</a>"

