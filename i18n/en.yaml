  other: "File paths and URLs in terminal output are clickable. ⌘+Click to open — paths open in Finder, URLs in your browser. Uses the OSC 8 hyperlink standard."

docs_triggers_title:
  other: "Regex Triggers"
docs_triggers_desc:
  other: "Automatic actions when terminal output matches a pattern. Configure in Settings → Appearance → Regex Triggers."
docs_triggers_notify:
