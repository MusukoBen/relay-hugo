  other: "Failed commands show a red dot and an 'Explain?' badge in the sidebar on hover"
docs_explain_click:
  other: "Clicking 'Explain?' sends 'relay explain' to the shell — the AI agent explains the last command"
docs_explain_requires:
  other: "Requires a configured AI provider (Anthropic or OpenAI) in settings"

