# ── Light Theme & Auto-Switch ──────────────────────────────────────
docs_nav_light_theme:
  other: "Light/Dark Mode"
docs_light_title:
  other: "Light/Dark Mode"
docs_light_desc:
  other: "Relay supports a light and a dark theme with automatic switching based on macOS system appearance."
