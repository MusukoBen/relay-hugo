  other: "Dark"
docs_light_mode_dark_desc:
  other: "Uses the configured dark theme (default: Relay Dark)."
docs_light_mode_light:
  other: "Light"
docs_light_mode_light_desc:
  other: "Uses the configured light theme (default: Relay Light)."
docs_light_mode_auto:
  other: "System"
docs_light_mode_auto_desc:
  other: "Automatically switches between light and dark when macOS changes appearance."
docs_light_note:
  other: "Configure the mode in Settings → Appearance → Color Scheme. In System mode, Relay observes the macOS appearance and switches themes instantly."

# ── Project Memory ─────────────────────────────────────────────────
docs_nav_project_memory:
  other: "Project Memory"
docs_pmem_title:
  other: "Project Memory"
docs_pmem_desc:
  other: "Relay persists per-project context to disk. Commands, directories, and usage frequency survive across sessions."
docs_pmem_commands:
  other: "Commands are deduplicated per project — stored with use count and last exit code"
docs_pmem_dirs:
  other: "Visited directories are tracked with visit count and timestamp"
docs_pmem_retention:
  other: "Retention is configurable: 7 days, 30 days, or unlimited"
docs_pmem_sidebar:
  other: "Most-used commands appear in the sidebar under 'Project History'"
docs_pmem_storage_title:
  other: "Storage"
docs_pmem_storage_desc:
  other: "One JSON file per project is stored under the configured path (default: ~/.config/relay/memory/). Max 500 commands and 200 directories per project."
docs_pmem_note:
  other: "On app launch, old entries are automatically pruned based on the retention setting. Empty project files are removed."

# ── Per-Pane Shell Toggle ──────────────────────────────────────────
docs_nav_shell_toggle:
  other: "Shell Mode Toggle"
docs_toggle_title:
  other: "Per-Pane Shell Mode"
docs_toggle_desc:
  other: "Each pane can individually switch between Relay prompt and user zshrc — directly in the pane header, without opening settings."
docs_toggle_badge:
  other: "A badge in the pane header shows the active mode: 'relay' (terminal icon) or 'zshrc' (person icon)"
docs_toggle_click:
  other: "Clicking the badge terminates the current shell and relaunches it with the other mode immediately"
docs_toggle_independent:
  other: "Each pane keeps its own mode — independent of other panes and the global setting"

# ── Explain Error ──────────────────────────────────────────────────
docs_nav_explain_error:
