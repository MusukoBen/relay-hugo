pricing_page_note_title:
  other: "Why pay what you want?"
pricing_page_note_desc:
  other: "Relay was built by a single person. You decide what it's worth — pay more if you like. Every euro above the minimum goes directly into continued development."
pricing_faq_title:
  other: "Frequently Asked Questions"
pricing_faq_q1:
  other: "What does \"pay what it's worth\" mean?"
pricing_faq_a1:
  other: "You pay at least €19 — that's the floor that keeps Relay sustainable. But you can pay €29, €49, or €100 if the product is worth more to you. Higher amounts directly support indie development."
pricing_faq_q2:
  other: "Is this a subscription?"
pricing_faq_a2:
  other: "No. It's a one-time payment. No monthly or yearly fees, no auto-renewal. You pay once and keep Relay forever."
pricing_faq_q3:
  other: "What do I get for my money?"
pricing_faq_a3:
  other: "All 16 themes, 12 prompt styles, 9 pane layouts, the built-in AI agent, project memory, iCloud sync, and all future v1.x updates. No feature gates, no hidden paywalls."
pricing_faq_q4:
  other: "Which payment methods are accepted?"
pricing_faq_a4:
  other: "Credit card, PayPal, and Apple Pay — processed via LemonSqueezy (your merchant of record). VAT-compliant invoices are generated automatically."
pricing_faq_q5:
  other: "Does Relay run on older Macs?"
pricing_faq_a5:
  other: "Relay requires macOS 14 Sonoma or later. Universal Binary — runs natively on Apple Silicon and Intel."
pricing_faq_q6:
  other: "What does \"all future v1.x updates\" mean?"
pricing_faq_a6:
  other: "You'll receive all new themes, features, and minor updates in the 1.x series for free. A future major version (2.0) would be a separate purchase — but not before 2028."

