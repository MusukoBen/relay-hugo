docs_blocks_title:
  other: "Command Blocks"
docs_blocks_desc:
  other: "Jeder Befehl und seine Ausgabe wird als eigenständiger Block mit visuellen Trennlinien dargestellt. Rechtsklick auf einen Befehl unter RECENT für Block-Aktionen."
docs_blocks_separators:
  other: "Visuelle Trennlinien"
docs_blocks_separators_desc:
  other: "Dezente Gradient-Linien zwischen Befehlen machen das Terminal auf einen Blick übersichtlich."
docs_blocks_actions:
  other: "Block-Aktionen"
docs_blocks_actions_desc:
  other: "Rechtsklick unter RECENT → Output kopieren, erneut ausführen, zum Block scrollen, Favorit hinzufügen."
docs_blocks_nav:
  other: "Block-Navigation"
docs_blocks_nav_desc:
  other: "⌘⇧↑ / ⌘⇧↓ zum Springen zwischen Command-Blocks."

docs_autocomplete_title:
  other: "Inline Autocomplete"
docs_autocomplete_desc:
  other: "IDE-artiges Dropdown das beim Tippen erscheint — mit Subcommands, Flags und Beschreibungen."
docs_autocomplete_specs:
  other: "Eingebaute Completion-Specs für:"
docs_autocomplete_keys:
  other: "Navigieren mit ↑/↓, akzeptieren mit Tab, schließen mit Esc."

docs_images_title:
  other: "Inline-Bilder"
docs_images_desc:
  other: "Bilder direkt im Terminal anzeigen — über das Kitty Graphics Protocol."
docs_images_protocol:
  other: "Unterstützt PNG, JPEG, GIF. Nutzt das Kitty-Protokoll mit chunked Base64-Übertragung für große Dateien."

docs_profile_title:
  other: "Automatischer Profil-Wechsel"
docs_profile_desc:
  other: "Das Theme wechselt automatisch basierend auf dem Kontext — visuelles Sicherheitsnetz für gefährliche Umgebungen."
docs_profile_ssh:
  other: "SSH-Verbindungen wechseln zu einem Warn-Theme (z.B. Obsidian). Konfigurierbar pro Host-Pattern."
docs_profile_dir:
  other: "Verzeichnis-Regeln"
docs_profile_dir_desc:
  other: "Theme wechselt beim Betreten bestimmter Verzeichnisse. Matching mit Regex-Patterns."

docs_clickable_title:
  other: "Klickbare Pfade & URLs"
docs_clickable_desc:
  other: "Dateipfade und URLs in der Terminal-Ausgabe sind klickbar. ⌘+Klick zum Öffnen — Pfade öffnen im Finder, URLs im Browser. Nutzt den OSC 8 Hyperlink-Standard."

docs_triggers_title:
  other: "Regex-Trigger"
docs_triggers_desc:
  other: "Automatische Aktionen wenn Terminal-Output einem Pattern entspricht. Konfigurierbar unter Einstellungen → Appearance → Regex Triggers."
docs_triggers_notify:
  other: "Benachrichtigungen"
docs_triggers_notify_desc:
  other: "macOS-Benachrichtigung wenn Output matcht (z.B. 'BUILD SUCCEEDED')."
docs_triggers_sound:
  other: "Sound"
docs_triggers_sound_desc:
  other: "Sound abspielen bei Pattern-Match (z.B. 'BUILD FAILED')."

docs_snippets_title:
  other: "Parametrisierte Snippets"
docs_snippets_desc:
  other: "Wiederverwendbare Befehlsvorlagen mit Platzhalter-Parametern. Doppelklick in der Sidebar zum Ausführen."
docs_snippets_how:
  other: "Beim Ausführen erscheint ein Formular für jeden Platzhalter. Live-Vorschau zeigt den aufgelösten Befehl vor dem Ausführen."

docs_sticky_title:
  other: "Sticky Command Header"
docs_sticky_desc:
  other: "Wenn ein Befehl lange Ausgabe produziert, bleibt sein Name oben im Terminal angepinnt — mit Elapsed-Timer. Du siehst immer was gerade läuft."

docs_blueprints_title:
  other: "Session Blueprints"
docs_blueprints_desc:
  other: "Workspace-Layouts als wiederverwendbare Templates speichern. Jeder Blueprint definiert Panes, Startverzeichnisse und Auto-Start-Befehle."
docs_blueprints_config:
  other: "Konfigurierbar unter Einstellungen → Integration → Session Blueprints. Starten über die Sidebar-Sektion BLUEPRINTS."

docs_panecolor_title:
  other: "Pane-Farbmarkierung"
docs_panecolor_desc:
  other: "Farben per Rechtsklick auf den Pane-Header zuweisen. 7 Preset-Farben (Grün, Rot, Gelb, Blau, Lila, Orange, Cyan) zur visuellen Unterscheidung von Umgebungen."

docs_pipeline_title:
  other: "CI/CD Pipeline Monitor"
docs_pipeline_desc:
  other: "GitHub Actions direkt in Relay überwachen. Nach git push erscheint der Pipeline-Status live in der Sidebar."
docs_pipeline_auto:
  other: "Auto-Erkennung"
docs_pipeline_auto_desc:
  other: "Erkennt git push aus jeder Shell (Relay, externes Terminal, IDE) über Filesystem-Überwachung."
docs_pipeline_live:
  other: "Live-Updates"
docs_pipeline_live_desc:
  other: "Steps aktualisieren sich alle 5 Sekunden mit animierter Fortschrittsanzeige und pulsierenden Status-Dots."
docs_pipeline_logs:
  other: "Job-Logs"
docs_pipeline_logs_desc:
  other: "Klick auf einen Step zeigt die Logs in einem Popover. Logs mit einem Klick in die Zwischenablage kopieren."

