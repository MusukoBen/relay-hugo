# --- Theme card descriptions ---
th_relay_dark_desc:
  other: "Das Standard-Theme. Tiefes Schwarz, grüner Akzent, sanfte Glassmorphism-Karten. Minimal und fokussiert."
th_midnight_desc:
  other: "Geometrisch und architektonisch. Transparente Karten mit sichtbaren Borders. Überall Großbuchstaben."
th_aurora_desc:
  other: "Lila Gradient-Buttons, Playfair Display für Überschriften, kursive Beschreibungen. Elegant und sanft."
th_obsidian_desc:
  other: "Gelber Akzent, IBM Plex Mono, scharfer 2px-Radius. Technisch und präzise."
th_sunset_desc:
  other: "Rosé und Koralle. Gradient-Speichern-Button, großer abgerundeter Radius. Warm und einladend."
th_arctic_desc:
  other: "Eisblau. Space Mono, kantiger 2px-Radius. Klar und kalt wie ein Serverraum."
th_bbc_desc:
  other: "Britischer 8-Bit-Computer. Orange-roter Phosphor, Scanline-Overlay, durchgehend Großbuchstaben."
th_apple2_desc:
  other: "Das Original. Grüner Phosphor auf Schwarz. Der Bildschirm der ersten Hacker."
th_amstrad_desc:
  other: "Cyan auf Schwarz. Kein Scanline-Overlay — das CPC-Display war bemerkenswert klar."
th_vt100_desc:
  other: "Das Unix-Arbeitstier. Warmer Bernstein-Phosphor, IBM Plex Mono, Scanline-Raster."
th_ibm3270_desc:
  other: "Das älteste Terminal im Set. Mainframe-Grün, IBM Plex Mono. Ohne Schnörkel."
th_xerox_desc:
  other: "Das einzige helle Retro-Theme. Papierweiß, Lora Serif, klassische Typografie."
th_gameboy_desc:
  other: "4-Farben-LCD-Palette. Press Start 2P, 4px-LCD-Scanlines. Das pixeligste Theme im Set."
th_zx_desc:
  other: "Gelb auf Schwarz. Keine Scanlines — der ZX hatte ein scharfes, klares Display."
th_dos_desc:
  other: "Blauer DOS-Hintergrund, Cyan-Akzent. Starker CRT-Effekt. C:\\>-Feeling."
th_c64_desc:
  other: "Commodore 64. Blauer Hintergrund, lila Text. READY. Der Klassiker."

