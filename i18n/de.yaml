pricing_page_note_title:
  other: "Warum Pay-what-you-want?"
pricing_page_note_desc:
  other: "Relay wurde von einer Person gebaut. Du entscheidest, was es dir wert ist — zahl mehr, wenn du magst. Jeder Euro über dem Minimum fließt direkt in die Weiterentwicklung."
pricing_faq_title:
  other: "Häufig gestellte Fragen"
pricing_faq_q1:
  other: "Was heißt \"Zahl, was es dir wert ist\"?"
pricing_faq_a1:
  other: "Du zahlst mindestens 19 € — das ist die Untergrenze, damit Relay sich trägt. Du kannst aber auch 29 €, 49 € oder 100 € zahlen, wenn dir das Produkt mehr wert ist. Höhere Beträge unterstützen direkt die Indie-Entwicklung."
pricing_faq_q2:
  other: "Ist das ein Abo?"
pricing_faq_a2:
  other: "Nein. Es ist eine einmalige Zahlung. Keine monatlichen oder jährlichen Gebühren, keine automatische Verlängerung. Du zahlst einmal und behältst Relay für immer."
pricing_faq_q3:
  other: "Was bekomme ich für mein Geld?"
pricing_faq_a3:
  other: "Alle 16 Themes, 12 Prompt-Stile, 9 Pane-Layouts, den eingebauten KI-Agenten, Project Memory, iCloud-Sync und alle zukünftigen v1.x-Updates. Keine Feature-Einschränkungen, keine versteckten Paywalls."
pricing_faq_q4:
  other: "Welche Zahlungsmethoden werden akzeptiert?"
pricing_faq_a4:
  other: "Kreditkarte, PayPal und Apple Pay — abgewickelt über LemonSqueezy (dein Merchant-of-Record). Rechnungen mit MwSt.-Ausweis werden automatisch erstellt."
pricing_faq_q5:
  other: "Läuft Relay auf älteren Macs?"
pricing_faq_a5:
  other: "Relay erfordert macOS 14 Sonoma oder neuer. Universal Binary — läuft nativ auf Apple Silicon und Intel."
pricing_faq_q6:
  other: "Was bedeutet \"alle zukünftigen v1.x-Updates\"?"
pricing_faq_a6:
  other: "Du erhältst alle neuen Themes, Features und Minor-Updates in der 1.x-Serie kostenlos. Eine zukünftige Major-Version (2.0) wäre ein separater Kauf — aber nicht vor 2028."

