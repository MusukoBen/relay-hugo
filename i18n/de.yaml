# ── PRIVACY PAGE ──
privacy_label:
  other: "Rechtliches"
privacy_title:
  other: "Datenschutzrichtlinie"
privacy_sub:
  other: "Relay wurde entwickelt, um deine Daten auf deinem Gerät zu belassen."
privacy_updated:
  other: "Zuletzt aktualisiert: 13. April 2026"
privacy_h_overview:
  other: "Überblick"
privacy_overview:
  other: "Relay ist ein nativer macOS-Terminal-Emulator. Er läuft vollständig auf deinem Gerät. Wir betreiben keine Server, die deine Daten empfangen, speichern oder verarbeiten."
privacy_h_no_collection:
  other: "Keine Datenerhebung"
privacy_no_collection:
  other: "Relay erhebt keinerlei Analysen, Telemetrie, Absturzberichte oder Nutzungsdaten. Es gibt keine Tracking-Pixel, keine SDKs und keine serverseitigen Logs. Wir wissen buchstäblich nicht, wer du bist."
privacy_h_local_storage:
  other: "Was lokal gespeichert wird"
privacy_local_storage:
  other: "Die folgenden Daten werden auf deinem Mac in UserDefaults und lokalen Konfigurationsdateien gespeichert. Sie verlassen dein Gerät nicht:"
privacy_local_1:
  other: "App-Einstellungen (Theme, Schrift, Shell-Konfiguration)"
privacy_local_2:
  other: "Befehlsverlauf und Arbeitsverzeichnisse"
privacy_local_3:
  other: "Gespeicherte KI-Konversationen"
privacy_local_4:
  other: "Lizenzschlüssel (im macOS-Schlüsselbund gespeichert)"
privacy_local_5:
  other: "KI-Provider-API-Keys (in UserDefaults gespeichert — werden nie an uns übertragen)"
privacy_local_note:
  other: "Alle diese Daten bleiben auf deinem Gerät. Eine Deinstallation von Relay entfernt sie."
privacy_h_network:
  other: "Netzwerkverbindungen"
privacy_network_intro:
  other: "Relay stellt nur in diesen Fällen ausgehende Netzwerkverbindungen her — alle von dir initiiert:"
privacy_net_sparkle_title:
  other: "Update-Prüfung —"
privacy_net_sparkle:
  other: "Sparkle prüft auf neue Versionen, indem es eine Appcast-XML-Datei abruft. Dabei werden deine App-Version und macOS-Version übertragen. Keine persönlichen Daten werden gesendet."
privacy_net_ai_title:
  other: "KI-Assistent —"
privacy_net_ai:
  other: "Wenn du relay ask oder relay explain verwendest, werden deine Anfrage und der Shell-Kontext an den von dir konfigurierten KI-Anbieter (OpenAI oder Anthropic) mit deinem eigenen API-Key gesendet. Relay leitet diese Anfragen nicht um, protokolliert sie nicht und speichert sie nicht."
privacy_net_webhook_title:
  other: "Webhooks —"
privacy_net_webhook:
  other: "Wenn du eine Webhook-URL in den Einstellungen konfigurierst, sendet Relay einen POST-Request mit Befehlsmetadaten an diese URL, wenn ein Befehl endet. Dies ist vollständig optional und geht an eine URL, die du kontrollierst."
privacy_network_note:
  other: "Relay stellt keine weiteren Netzwerkverbindungen her. Es gibt kein Phone-Home, keinen Lizenzserver und keine Cloud-Synchronisation."
privacy_h_third_party:
  other: "Drittanbieter-Dienste"
privacy_third_party:
  other: "Relay selbst integriert keine Analyse- oder Werbedienste von Drittanbietern. Wenn du den KI-Assistenten nutzt, werden deine Anfragen von OpenAI oder Anthropic gemäß deren jeweiliger Datenschutzrichtlinie verarbeitet. Relay hat keine Verbindung zu einem der Anbieter."
privacy_h_children:
  other: "Kinder"
privacy_children:
  other: "Relay richtet sich nicht an Kinder unter 13 Jahren und erhebt wissentlich keine Daten von Kindern."
privacy_h_changes:
  other: "Änderungen dieser Richtlinie"
privacy_changes:
  other: "Wenn wir diese Richtlinie aktualisieren, veröffentlichen wir die Änderungen auf dieser Seite mit einem neuen Datum. Da Relay keine Daten erhebt, sind wesentliche Änderungen unwahrscheinlich."
privacy_h_contact:
  other: "Kontakt"
privacy_contact:
  other: "Fragen zu dieser Richtlinie? E-Mail an <a href=\"mailto:relay-support@notetheco.de\">relay-support@notetheco.de</a>"

