# ── Light Theme & Auto-Switch ──────────────────────────────────────
docs_nav_light_theme:
  other: "Hell/Dunkel-Modus"
docs_light_title:
  other: "Hell/Dunkel-Modus"
docs_light_desc:
  other: "Relay unterstützt ein helles und ein dunkles Theme mit automatischem Wechsel basierend auf der macOS-Systemeinstellung."
docs_light_scheme_title:
  other: "Farb-Schema"
docs_light_col_mode:
  other: "Modus"
docs_light_mode_dark:
  other: "Dunkel"
docs_light_mode_dark_desc:
  other: "Verwendet das konfigurierte dunkle Theme (Standard: Relay Dark)."
docs_light_mode_light:
  other: "Hell"
docs_light_mode_light_desc:
  other: "Verwendet das konfigurierte helle Theme (Standard: Relay Light)."
docs_light_mode_auto:
  other: "System"
docs_light_mode_auto_desc:
  other: "Wechselt automatisch zwischen Hell und Dunkel wenn macOS den Modus ändert."
docs_light_note:
  other: "Der Modus wird in den Einstellungen unter Erscheinungsbild → Farb-Schema konfiguriert. Bei System wird die macOS-Einstellung beobachtet und das Theme sofort gewechselt."

# ── Project Memory ─────────────────────────────────────────────────
docs_nav_project_memory:
  other: "Project Memory"
docs_pmem_title:
  other: "Project Memory"
docs_pmem_desc:
  other: "Relay speichert Kontext pro Projekt-Verzeichnis persistent auf Disk. Commands, Verzeichnisse und Nutzungshäufigkeit bleiben über Sessions hinweg erhalten."
docs_pmem_commands:
  other: "Commands werden pro Projekt dedupliziert gespeichert — mit Nutzungshäufigkeit und letztem Exit-Code"
docs_pmem_dirs:
  other: "Besuchte Verzeichnisse werden mit Besuchszähler und Zeitstempel erfasst"
docs_pmem_retention:
  other: "Aufbewahrung konfigurierbar: 7 Tage, 30 Tage oder unbegrenzt"
docs_pmem_sidebar:
  other: "Die häufigsten Commands erscheinen in der Sidebar unter 'Project History'"
docs_pmem_storage_title:
  other: "Speicherort"
docs_pmem_storage_desc:
  other: "Pro Projekt wird eine JSON-Datei unter dem konfigurierten Pfad gespeichert (Standard: ~/.config/relay/memory/). Max. 500 Commands und 200 Verzeichnisse pro Projekt."
docs_pmem_note:
  other: "Beim App-Start werden alte Einträge basierend auf der Retention-Einstellung automatisch bereinigt. Leere Projektdateien werden entfernt."

# ── Per-Pane Shell Toggle ──────────────────────────────────────────
docs_nav_shell_toggle:
  other: "Shell-Modus-Toggle"
docs_toggle_title:
  other: "Per-Pane Shell-Modus"
docs_toggle_desc:
  other: "Jeder Pane kann individuell zwischen Relay-Prompt und User-zshrc umgeschaltet werden — direkt im Pane-Header, ohne die Einstellungen zu öffnen."
docs_toggle_badge:
  other: "Ein Badge im Pane-Header zeigt den aktiven Modus: 'relay' (Terminal-Icon) oder 'zshrc' (Person-Icon)"
docs_toggle_click:
  other: "Ein Klick auf das Badge terminiert die aktuelle Shell und startet sie sofort mit dem anderen Modus neu"
docs_toggle_independent:
  other: "Jeder Pane behält seinen eigenen Modus — unabhängig von anderen Panes und der globalen Einstellung"

# ── Explain Error ──────────────────────────────────────────────────
docs_nav_explain_error:
  other: "Explain Error"
docs_explain_title:
  other: "Automatisches Error-Explain"
docs_explain_desc:
  other: "Wenn ein Befehl mit einem Fehler-Exit-Code endet, bietet Relay an, den Fehler automatisch vom AI-Agenten erklären zu lassen."
docs_explain_badge:
  other: "Fehlgeschlagene Commands werden in der Sidebar mit einem roten Punkt und einem 'Explain?'-Badge markiert"
docs_explain_click:
  other: "Ein Klick auf 'Explain?' sendet 'relay explain' an die Shell — der AI-Agent erklärt den letzten Befehl"
docs_explain_requires:
  other: "Erfordert einen konfigurierten AI-Provider (Anthropic oder OpenAI) in den Einstellungen"

