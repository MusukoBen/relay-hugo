name: Deploy to relay-app.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy via SFTP
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.SFTP_SERVER_DIR }}
        run: |
          sudo apt-get install -y sshpass lftp > /dev/null 2>&1
          lftp -u "$SFTP_USER","$SFTP_PASS" -p 22 sftp://host254.checkdomain.de -e "
            set sftp:auto-confirm yes;
            mirror --reverse --delete --verbose ./public/ $SFTP_DIR;
            quit
          "
