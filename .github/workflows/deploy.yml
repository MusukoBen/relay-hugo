name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify --baseURL "https://relay-app.dev/"

      - name: Deploy via rsync
        env:
          SSH_HOST: host254.checkdomain.de
          SSH_USER: ${{ secrets.SFTP_USER }}
          SSH_PASS: ${{ secrets.SFTP_PASSWORD }}
          SSH_DIR: ${{ secrets.SFTP_SERVER_DIR }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -p "$SSH_PASS" rsync -avz --delete \
            -e "ssh -p 22 -o StrictHostKeyChecking=no" \
            public/ \
            "$SSH_USER@$SSH_HOST:$SSH_DIR/"
