name: Deploy to relay-app.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify --ignoreErrors=error-missing-instagram-accesstoken

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: host254.checkdomain.de
          port: 22
          protocol: sftp
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local-dir: ./public/
          server-dir: ${{ secrets.SFTP_SERVER_DIR }}
