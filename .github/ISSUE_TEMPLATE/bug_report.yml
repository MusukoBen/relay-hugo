name: Bug Report
description: Report a bug or issue with the Relay website
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! You can also reach us at **relay-support@notetheco.de**.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: browser
    attributes:
      label: Browser & OS
      description: Which browser and operating system are you using?
      placeholder: e.g. Safari 18 on macOS 15
