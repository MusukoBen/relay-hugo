<div class="hero-bg">
  <div class="hero-aurora"></div>
  <div class="hero-grid"></div>
</div>
<div class="hero-inner">
  <div class="hero-badge">
    <span class="hero-badge-dot"></span>
    {{ i18n "hero_badge" }}
  </div>
  <h1 class="hero-title">
    {{ i18n "hero_title_line1" }}<br>
    <span class="hero-title-acc">{{ i18n "hero_title_line2" }}</span><br>
    {{ i18n "hero_title_line3" }}
  </h1>
  <p class="hero-sub">{{ i18n "hero_sub" }}</p>
  <div class="hero-cta">
    <a href="#download" class="btn btn--primary btn--lg">{{ i18n "hero_cta_notify" }}</a>
    <a href="#features" class="btn btn--ghost btn--lg">{{ i18n "hero_cta_features" }}</a>
  </div>
  <div class="hero-meta">
    <span>{{ i18n "hero_meta_platform" }}</span>
    <span class="hero-meta-sep">·</span>
    <span>{{ i18n "hero_meta_coming_soon" }}</span>
  </div>
</div>
