<section class="retro-section" id="themes">
  <div class="section-inner">
    <div class="section-label">{{ i18n "retro_label" }}</div>
    <h2 class="section-title">{{ i18n "retro_title" }}</h2>
    <p class="section-sub">{{ i18n "retro_sub" }}</p>
    <div class="retro-grid">
      <div class="retro-card" style="--rc:#ff4400;--rb:#000">
        <div class="retro-year">1981</div>
        <div class="retro-name">BBC Micro</div>
        <div class="retro-term" style="font-family:'VT323',monospace;letter-spacing:3px;font-size:22px;color:#ff4400">READY<br>█</div>
      </div>
      <div class="retro-card" style="--rc:#33ff33;--rb:#000">
        <div class="retro-year">1977</div>
        <div class="retro-name">Apple II</div>
        <div class="retro-term" style="font-family:'VT323',monospace;font-size:15px;color:#33ff33">]<br>█</div>
      </div>
      <div class="retro-card" style="--rc:#ffb000;--rb:#0a0700">
        <div class="retro-year">1978</div>
        <div class="retro-name">VT100 Amber</div>
        <div class="retro-term" style="font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:3px;color:#ffb000">login: █</div>
      </div>
      <div class="retro-card" style="--rc:#8bac0f;--rb:#0f380f">
        <div class="retro-year">1989</div>
        <div class="retro-name">Game Boy</div>
        <div class="retro-term" style="font-size:8px;color:#8bac0f;letter-spacing:1px;text-transform:uppercase">READY<br>█</div>
      </div>
      <div class="retro-card" style="--rc:#8080ff;--rb:#2121d5">
        <div class="retro-year">1982</div>
        <div class="retro-name">C64</div>
        <div class="retro-term" style="font-family:'VT323',monospace;font-size:18px;color:#8080ff"> READY.<br>█</div>
      </div>
      <div class="retro-card" style="--rc:#00ffff;--rb:#000">
        <div class="retro-year">1984</div>
        <div class="retro-name">Amstrad CPC</div>
        <div class="retro-term" style="font-family:'VT323',monospace;font-size:21px;letter-spacing:3px;color:#00ffff">OK<br>█</div>
      </div>
    </div>
  </div>
</section>
