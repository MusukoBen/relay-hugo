<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitter 2 — Themes</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--twitter">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon"></div>
      <span>relay</span>
    </div>
    <div class="post-tagline">16 THEMES</div>
  </div>

  <div class="post-content">
    <div class="post-label">Glass + Retro</div>
    <h1 class="post-title">
      16 Themes. <span class="post-title-acc">One app.</span>
    </h1>
    <p class="post-sub" style="margin-bottom:24px;">Each theme transforms the entire visual system — fonts, spacing, glassmorphism, ANSI palette.</p>

    <div style="display:flex; flex-wrap:wrap; gap:10px;">
      <span class="theme-chip" style="--tc:#4af09a;"><span class="theme-chip-dot"></span>Relay Dark</span>
      <span class="theme-chip" style="--tc:#6c8fff;"><span class="theme-chip-dot"></span>Midnight</span>
      <span class="theme-chip" style="--tc:#c084fc;"><span class="theme-chip-dot"></span>Aurora</span>
      <span class="theme-chip" style="--tc:#f59e0b;"><span class="theme-chip-dot"></span>Obsidian</span>
      <span class="theme-chip" style="--tc:#ff6b6b;"><span class="theme-chip-dot"></span>Sunset</span>
      <span class="theme-chip" style="--tc:#67e8f9;"><span class="theme-chip-dot"></span>Arctic</span>
      <span class="theme-chip" style="--tc:#ff4400;font-family:'VT323',monospace;font-size:16px;"><span class="theme-chip-dot"></span>BBC Micro</span>
      <span class="theme-chip" style="--tc:#33ff33;font-family:'VT323',monospace;font-size:16px;"><span class="theme-chip-dot"></span>Apple II</span>
      <span class="theme-chip" style="--tc:#8bac0f;"><span class="theme-chip-dot"></span>Game Boy</span>
      <span class="theme-chip" style="--tc:#8080ff;font-family:'VT323',monospace;font-size:16px;"><span class="theme-chip-dot"></span>C64</span>
    </div>
  </div>

  <div class="post-footer">
    <span class="post-footer-url">→ relay.app/themes</span>
    <span class="post-footer-num">02 / 04</span>
  </div>
</div>
</body>
</html>
