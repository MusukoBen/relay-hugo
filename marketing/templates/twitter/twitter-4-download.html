<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitter 4 — Download</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--twitter">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon"></div>
      <span>relay</span>
    </div>
    <div class="post-tagline">DOWNLOAD NOW</div>
  </div>

  <div class="post-content" style="text-align:center; align-items:center;">
    <div class="post-badge">
      <span class="post-badge-dot"></span>
      RELAY 1.0 · OUT NOW
    </div>
    <h1 class="post-title post-title--xl">
      Ready? <span class="post-title-acc">Build it.</span>
    </h1>
    <p class="post-sub" style="text-align:center; margin:0 auto;">Free · No account · Just open and go</p>

    <div style="display:flex; gap:20px; align-items:center; margin-top:28px;">
      <div class="cta-btn" style="font-size:22px; padding:18px 36px;">
        ↓ DOWNLOAD FREE
      </div>
      <div style="font-family:var(--mono); font-size:13px; color:var(--acc); padding:14px 22px; background:var(--surface); border:1px solid var(--border); border-radius:10px;">
        $ brew install --cask relay
      </div>
    </div>
    <div class="cta-meta">macOS 14+ · UNIVERSAL · 18.4 MB · SIGNED BY APPLE</div>
  </div>

  <div class="post-footer">
    <span class="post-footer-url">→ relay.app</span>
    <span class="post-footer-num">04 / 04</span>
  </div>
</div>
</body>
</html>
