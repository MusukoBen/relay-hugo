<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lemon 5 — Pay What You Want</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--lemon">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon"></div>
      <span>relay</span>
    </div>
    <div class="post-tagline">PRICING</div>
  </div>

  <div class="post-content">
    <div class="post-label">Pay what it's worth to you</div>
    <h1 class="post-title">
      <span class="post-title-acc">Name</span><br>
      your price.
    </h1>

    <div class="lemon-price">
      <span class="lemon-price-from">from</span>
      <span class="lemon-price-amount">€19</span>
    </div>
    <div class="lemon-price-note">
      One-time payment. No subscription. Yours forever.
    </div>
    <div class="lemon-price-sub">
      Like what you see? Pay more. The extra supports indie development.
    </div>

    <div style="display:flex; gap:40px; margin-top:52px; flex-wrap:wrap;">
      <div style="display:flex; align-items:center; gap:14px;">
        <div class="lemon-list-check">✓</div>
        <span style="font-size:22px; color:var(--text);">Lifetime license</span>
      </div>
      <div style="display:flex; align-items:center; gap:14px;">
        <div class="lemon-list-check">✓</div>
        <span style="font-size:22px; color:var(--text);">All future v1.x updates</span>
      </div>
    </div>
  </div>

  <div class="post-footer">
    <span class="post-footer-url">→ relay.app</span>
    <span class="post-footer-num">05 / 06</span>
  </div>
</div>
</body>
</html>
