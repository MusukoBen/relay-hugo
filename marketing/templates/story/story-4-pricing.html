<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Story 4 — Pay What You Want</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--story">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon" style="width:48px; height:48px;"></div>
      <span style="font-size:30px;">relay</span>
    </div>
    <div class="post-tagline" style="font-size:14px;">PRICING</div>
  </div>

  <div class="post-content">
    <div class="post-label" style="font-size:20px;">Pay what it's worth to you</div>
    <h1 class="post-title">
      <span class="post-title-acc">Name</span><br>
      your price.
    </h1>

    <div style="margin-top:72px; text-align:center;">
      <div style="font-family:var(--mono); font-size:24px; color:var(--sec); letter-spacing:3px; text-transform:uppercase;">from</div>
      <div style="font-size:280px; font-weight:900; color:var(--acc); letter-spacing:-0.05em; line-height:1; text-shadow:0 0 120px var(--acc-glow); margin-top:12px;">€19</div>
    </div>

    <p style="font-size:32px; color:var(--text); margin-top:56px; font-weight:500; text-align:center; line-height:1.4;">
      One-time payment.<br>
      No subscription.<br>
      Yours forever.
    </p>

    <p style="font-family:var(--mono); font-size:20px; color:var(--sec); margin-top:32px; letter-spacing:1px; text-align:center;">
      Pay more if you like.
    </p>
  </div>

  <div class="story-tap">SWIPE UP</div>

  <div class="post-footer">
    <span class="post-footer-url" style="font-size:18px;">→ relay.app/pricing</span>
    <span class="post-footer-num" style="font-size:14px;">04 / 05</span>
  </div>
</div>
</body>
</html>
