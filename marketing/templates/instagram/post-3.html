<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post 3 — Glass Themes</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--instagram">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon"></div>
      <span>relay</span>
    </div>
    <div class="post-tagline">GLASS THEMES</div>
  </div>

  <div class="post-content">
    <div class="post-label">Six Modern Glass Themes</div>
    <h1 class="post-title post-title--lg">
      Six <span class="post-title-acc">moods</span>.<br>
      One app.
    </h1>

    <div style="display:flex; flex-wrap:wrap; gap:16px; margin-top:32px;">
      <span class="theme-chip" style="--tc:#4af09a;font-size:18px;padding:12px 22px;">
        <span class="theme-chip-dot"></span>Relay Dark
      </span>
      <span class="theme-chip" style="--tc:#6c8fff;font-size:18px;padding:12px 22px;">
        <span class="theme-chip-dot"></span>Midnight
      </span>
      <span class="theme-chip" style="--tc:#c084fc;font-size:18px;padding:12px 22px;">
        <span class="theme-chip-dot"></span>Aurora
      </span>
      <span class="theme-chip" style="--tc:#f59e0b;font-size:18px;padding:12px 22px;">
        <span class="theme-chip-dot"></span>Obsidian
      </span>
      <span class="theme-chip" style="--tc:#ff6b6b;font-size:18px;padding:12px 22px;">
        <span class="theme-chip-dot"></span>Sunset
      </span>
      <span class="theme-chip" style="--tc:#67e8f9;font-size:18px;padding:12px 22px;">
        <span class="theme-chip-dot"></span>Arctic
      </span>
    </div>

    <p class="post-sub" style="margin-top:36px;">Each theme transforms fonts, spacing, glassmorphism, and accent color — all at once, live.</p>
  </div>

  <div class="post-footer">
    <span class="post-footer-url">→ relay.app/themes</span>
    <span class="post-footer-num">03 / 09</span>
  </div>
</div>
</body>
</html>
