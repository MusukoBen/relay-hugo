<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post 8 — Pay What You Want</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--instagram">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon"></div>
      <span>relay</span>
    </div>
    <div class="post-tagline">PRICING</div>
  </div>

  <div class="post-content">
    <div class="post-label">Pay what it's worth to you</div>
    <h1 class="post-title">
      <span class="post-title-acc">Name</span><br>
      your price.
    </h1>

    <div style="display:flex; align-items:baseline; gap:16px; margin-top:36px;">
      <span style="font-family:var(--mono); font-size:18px; color:var(--sec); letter-spacing:2px; text-transform:uppercase;">from</span>
      <span style="font-size:140px; font-weight:900; color:var(--acc); letter-spacing:-0.05em; line-height:0.9; text-shadow:0 0 60px var(--acc-glow);">€19</span>
    </div>
    <p style="font-size:22px; color:var(--text); margin-top:22px; font-weight:500;">
      One-time payment. No subscription.<br>Yours forever.
    </p>
    <p style="font-family:var(--mono); font-size:15px; color:var(--sec); margin-top:14px; letter-spacing:1px;">
      Pay more if you like — it supports indie dev.
    </p>

    <div style="display:flex; gap:32px; margin-top:44px; flex-wrap:wrap;">
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:26px; height:26px; border-radius:50%; background:var(--acc-dim); border:1px solid rgba(74,240,154,.35); color:var(--acc); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;">✓</div>
        <span style="font-size:18px; color:var(--text);">Lifetime license</span>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:26px; height:26px; border-radius:50%; background:var(--acc-dim); border:1px solid rgba(74,240,154,.35); color:var(--acc); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;">✓</div>
        <span style="font-size:18px; color:var(--text);">All future v1.x updates</span>
      </div>
    </div>
  </div>

  <div class="post-footer">
    <span class="post-footer-url">→ relay.app/pricing</span>
    <span class="post-footer-num">08 / 09</span>
  </div>
</div>
</body>
</html>
