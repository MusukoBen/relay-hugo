<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post 4 — Retro Themes</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--instagram">
  <div class="bg-aurora"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon"></div>
      <span>relay</span>
    </div>
    <div class="post-tagline">RETRO COLLECTION</div>
  </div>

  <div class="post-content">
    <div class="post-label">1971 — 1989</div>
    <h1 class="post-title post-title--lg">
      Ten <span class="post-title-acc">legends</span>.<br>
      Fully revived.
    </h1>

    <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:14px; margin-top:32px;">
      <div style="background:#000; border:1px solid #ff4400; border-radius:12px; padding:18px 22px;">
        <div style="font-family:'VT323',monospace; font-size:32px; color:#ff4400; letter-spacing:3px;">BBC MICRO</div>
        <div style="font-family:var(--mono); font-size:13px; color:#ff4400; opacity:.7; margin-top:4px;">1981 · BRITISH 8-BIT</div>
      </div>
      <div style="background:#000; border:1px solid #33ff33; border-radius:12px; padding:18px 22px;">
        <div style="font-family:'VT323',monospace; font-size:32px; color:#33ff33;">APPLE II</div>
        <div style="font-family:var(--mono); font-size:13px; color:#33ff33; opacity:.7; margin-top:4px;">1977 · GREEN PHOSPHOR</div>
      </div>
      <div style="background:#0a0700; border:1px solid #ffb000; border-radius:12px; padding:18px 22px;">
        <div style="font-family:'Geist Mono',monospace; font-size:24px; color:#ffb000; letter-spacing:3px;">VT100 AMBER</div>
        <div style="font-family:var(--mono); font-size:13px; color:#ffb000; opacity:.7; margin-top:4px;">1978 · UNIX WORKHORSE</div>
      </div>
      <div style="background:#0f380f; border:1px solid #8bac0f; border-radius:12px; padding:18px 22px;">
        <div style="font-family:'Press Start 2P',monospace; font-size:18px; color:#8bac0f;">GAME BOY</div>
        <div style="font-family:var(--mono); font-size:13px; color:#8bac0f; opacity:.7; margin-top:4px;">1989 · 4-COLOR LCD</div>
      </div>
      <div style="background:#000; border:1px solid #00ffff; border-radius:12px; padding:18px 22px;">
        <div style="font-family:'VT323',monospace; font-size:32px; color:#00ffff; letter-spacing:2px;">AMSTRAD CPC</div>
        <div style="font-family:var(--mono); font-size:13px; color:#00ffff; opacity:.7; margin-top:4px;">1984 · CYAN ON BLACK</div>
      </div>
      <div style="background:#2121d5; border:1px solid #8080ff; border-radius:12px; padding:18px 22px;">
        <div style="font-family:'VT323',monospace; font-size:32px; color:#8080ff;">C64 READY.</div>
        <div style="font-family:var(--mono); font-size:13px; color:#8080ff; opacity:.7; margin-top:4px;">1982 · COMMODORE</div>
      </div>
    </div>
  </div>

  <div class="post-footer">
    <span class="post-footer-url">→ relay.app/themes</span>
    <span class="post-footer-num">04 / 09</span>
  </div>
</div>
</body>
</html>
