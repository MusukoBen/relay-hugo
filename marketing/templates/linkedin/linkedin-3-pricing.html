<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn 3 — Pay What You Want</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--linkedin">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon"></div>
      <span>relay</span>
    </div>
    <div class="post-tagline">PRICING</div>
  </div>

  <div class="post-content">
    <div class="h-split">
      <div class="h-split-left">
        <div class="post-label">Indie pricing · PWYW</div>
        <h1 class="post-title">
          <span class="post-title-acc">Name</span><br>
          your price.
        </h1>
        <p class="post-sub" style="margin-top:12px;">
          One-time · No subscription · Yours forever.
        </p>
      </div>

      <div class="h-split-right">
        <div style="background:var(--surface); border:2px solid var(--acc); border-radius:18px; padding:36px 40px; text-align:center; box-shadow:0 0 40px rgba(74,240,154,.15);">
          <div style="font-family:var(--mono); font-size:12px; color:var(--sec); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px;">from</div>
          <div style="font-size:90px; font-weight:900; color:var(--acc); letter-spacing:-0.05em; line-height:1;">€19</div>
          <div style="font-size:13px; color:var(--text); margin-top:14px; font-weight:500;">Lifetime license</div>
          <div style="font-family:var(--mono); font-size:10px; color:var(--sec); margin-top:4px; letter-spacing:1px;">PAY MORE IF YOU LIKE</div>
        </div>
      </div>
    </div>
  </div>

  <div class="post-footer">
    <span class="post-footer-url">relay.app/pricing</span>
    <span class="post-footer-num">Get it now →</span>
  </div>
</div>
</body>
</html>
