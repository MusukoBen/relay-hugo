<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn 4 — Download</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="post post--linkedin">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="post-header">
    <div class="post-logo">
      <div class="post-logo-icon"></div>
      <span>relay</span>
    </div>
    <div class="post-tagline">DOWNLOAD</div>
  </div>

  <div class="post-content">
    <div class="h-split">
      <div class="h-split-left">
        <div class="post-badge">
          <span class="post-badge-dot"></span>
          AVAILABLE NOW
        </div>
        <h1 class="post-title">
          Build your<br>
          <span class="post-title-acc">terminal today.</span>
        </h1>
        <p class="post-sub">Free download. No account. No email. Just open and go.</p>
      </div>
      <div class="h-split-right">
        <div style="display:flex; flex-direction:column; gap:14px; width:100%;">
          <div class="cta-btn" style="font-size:20px; padding:18px 32px; justify-content:center;">
            ↓ Download Relay 1.0
          </div>
          <div style="text-align:center; font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:1px;">
            macOS 14+ · UNIVERSAL · 18.4 MB
          </div>
          <div style="display:flex; align-items:center; gap:10px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:10px; font-family:var(--mono); font-size:13px; color:var(--acc);">
            <span style="color:var(--dim);">$</span> brew install --cask relay
          </div>
          <div style="display:flex; align-items:center; gap:8px; padding-top:8px; font-family:var(--mono); font-size:11px; color:var(--sec);">
            <span style="color:var(--acc);">✓</span> Signed &amp; notarized by Apple
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="post-footer">
    <span class="post-footer-url">relay.app</span>
    <span class="post-footer-num">Get Started →</span>
  </div>
</div>
</body>
</html>
